<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Demo App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: rgba(0, 0, 0, 0.2);
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 2.5rem;
        }

        .version {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #ffd700;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #ff7eb3;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background-color: #ff4e8a;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚀 CI/CD Demo Web App</h1>
        <p>This app is deployed using GitHub CI/CD pipeline.</p>

        <div class="version">
            Version: <span id="version">1.0.0</span>
        </div>

        <button onclick="updateVersion()">Simulate Update</button>
    </div>

    <script>
        let versionNumber = 1.0;

        function updateVersion() {
            versionNumber += 0.1;
            document.getElementById("version").innerText = versionNumber.toFixed(1);
        }
    </script>

</body>
</html>
